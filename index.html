<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        html {
            height: 100%;
        }
        body {
            height: 100%;
        }
        .container {
            height: 100%;
            background-image: linear-gradient(to right, #fbc2eb, #a6c1ee);
        }
        .login-wrapper {
            background-color: #fff;
            width: 280px;
            height: 390px;
            border-radius: 15px;
            padding: 0 50px;
            position: relative;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: #7c7c7c 0px 0px 8px 0px;
        }
        .header {
            font-size: 38px;
            font-weight: bold;
            text-align: center;
            line-height: 150px;
        }
        .input-item {
            display: block;
            width: 93%;
            margin-bottom: 20px;
            border: 0;
            padding: 10px;
            border-bottom: 1px solid rgb(128, 125, 125);
            font-size: 15px;
            outline: none;
        }
        .input-item:placeholder {
            text-transform: uppercase;
        }
        .btn {
            text-align: center;
            padding: 10px;
            width: 93%;
            margin-top: 40px;
            background-color: #006eff;
            color: #fff;
            user-select: none;
        }
        .btn:active{
            background-color: #7db4fc;
        }
        .msg {
            text-align: center;
            line-height: 88px;
        }
        .loginfailed {
            display: none;
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        a {
            text-decoration-line: none;
            color: #abc1ee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-wrapper">
            <div class="header">后台登录入口</div>
            <div class="form-wrapper">
                <input type="text" name="username" placeholder="管理员账户" class="input-item" autofocus>
                <input type="password" name="password" placeholder="密码" class="input-item">
                <div class="btn">登录</div>
                <a class="loginfailed">用户名或密码错误</a>
            </div>
            
        </div>
    </div>
</body>
</html>
