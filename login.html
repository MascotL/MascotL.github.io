<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>

    <link rel="stylesheet" href="./css/login.css">
</head>
<body>
    <div class="bg">
        <div class="main">
            <div class="logfail">
                <a>用户名或密码不正确。</a>
                <div class="logfail-close">×</div>
            </div>

            <script>  
                document.querySelector('.logfail-close').addEventListener('click', function() {  
                    var logfailElement = document.querySelector('.logfail');  
                    logfailElement.style.display = 'none'; // 将元素设置为不可见  
                });  
            </script>

            <div class="login-wrapper">
                <div class="login-form">  
                    <form action="/login" method="post">  
                        <label for="username">用户名:</label>  
                        <input type="text" id="username" name="username" required>  
                        <label for="password">密码:</label>   
                        <input type="password" id="password" name="password" required>  
                        <div class="forgot-password">  
                            <a href="/forgot-password">忘记密码?</a>  
                        </div> 
                        <input type="submit" class="login-button" value="登录">  
                    </form>  
                </div>
            </div>
        </div>
        <footer class="footer">
            <a href="#">服务条款</a>
            <a href="#">隐私政策</a>
            <a href="#">文档</a>
            <a href="#">支持</a>
            <a href="#">开源协议</a>
        </footer>
    </div>
</body>
</html>
