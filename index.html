<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>博客</title>
    <link rel="icon" href="resource\logo.ico" type="image/x-icon">
    <style>
        @font-face {
            font-family: "iFont"; /* 自定义字体名称 */
            src: url("font/苹方-简 常规体.otf"); /* 字体文件路径 */
        }

        /* 定义一个固定在顶部的导航栏样式 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #0081cc;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-around;
            justify-content: center; /* 这个属性可以让导航栏的选项卡靠中间居中 */
        }
        /* 定义导航栏中的链接样式 */
        .navbar a {
            height: 20px;
            text-decoration: none;
            color: #ffffff;
            margin: 0 50px; /* 这个属性可以让链接之间有10像素的水平间隙 */
        }
        /* 定义一个主体内容的样式 */
        .content {
            margin-top: 50px; /* 这个值要和导航栏的高度一致或者更大 */
        }
        .href {
            text-decoration: none;
            color: rgb(120, 120, 255);
        }
        /* 定义一个固定在底部的版权栏样式 */
        body {
            position: relative;
            padding-bottom: 100px; /* 或者 margin-bottom: 100px; */
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            font-size: 14px;
            background-color: #f7f7f7;
            color: #3e3e3e;
            display: flex;
            text-align: left;
            align-items: center;
            justify-content: center; 
        }

    </style>
</head>
<body style="font-family: iFont;">
    <!-- 创建一个导航栏 -->
    <div class="navbar">
            <a href="#" class="navbar_logo">
                <img src="resource/navbar_logo.png" alt="logo" width="20" height="20">
            </a>
            <a href="#">首页</a>
            <a href="#">下载</a>
            <a href="#">支持</a>
    </div>

    <!-- 创建一个主体内容 -->
    <div class="content">
        <a href="./login.html">login</a>

    </div>
    
    <!-- 创建一个版权栏 -->
    <div class="footer">
        <div style="width: 60%; height: 70%;">
            <img src="resource/footer_logo.png" alt="logo" width="13" height="13">
            <a>Github: </a>
            <a href="https://github.com/MascotL" class="href">MascotL</a>
            <a><br>© 2023 MascotL. 本网站使用 </a>
            <a href="https://opensource.org/license/MIT/" class="href" >MIT许可协议</a>
            <a></a>
        </div>
    </div>
</body>
</html>
